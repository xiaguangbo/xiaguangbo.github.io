<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="resource/favicon.png" />
  <title>document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify v4 -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"> -->
  <link rel="stylesheet" href="extension/docsify/vue.css">

  <!-- 侧边栏折叠 -->
  <!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" /> -->
  <link rel="stylesheet" href="extension/docsify-sidebar-collapse/sidebar.min.css">
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      // git 猫
      name: 'xiaguangbo',
      repo: 'https://github.com/xiaguangbo/xiaguangbo.github.io',

      // 侧边栏
      loadSidebar: true,
      subMaxLevel: 6,

      // 搜索
      search: {
        placeholder: '搜索',
        noData: '无结果',
      },

      // 复制代码
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      }
    }
  </script>

  <!-- 官方给的离线使用的插件 -->
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('extension/sw/sw.js')
    }
  </script>

  <!-- Docsify v4 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify@4"></script> -->
  <script src="extension/docsify/docsify@4.js"></script>

  <!-- 搜索 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify/lib/extensions/search.min.js"></script> -->
  <script src="extension/search/search.min.js"></script>

  <!-- 侧边栏折叠 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script> -->
  <script src="extension/docsify-sidebar-collapse/docsify-sidebar-collapse.min.js"></script>

  <!-- 复制代码 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script> -->
  <script src="extension/docsify-copy-code/docsify-copy-code.js"></script>

</body>

</html>
